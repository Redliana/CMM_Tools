[project]
name = "usitc-mcp"
version = "0.1.0"
description = "MCP server for USITC DataWeb US import/export trade statistics"
requires-python = ">=3.10"
dependencies = [
    "mcp[cli]>=1.0.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
usitc-mcp = "usitc_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/usitc_mcp"]
